- name: Install VSCode
  homebrew_cask:
    name: visual-studio-code
    state: present
  tags:
    - vscode

- name: Create VSCode User directory
  file:
    path: "{{ ansible_facts.env.HOME }}/Library/Application Support/Code/User"
    state: directory
    mode: "0755"
  tags:
    - vscode

- name: Merge and write VSCode settings
  command: >
    python3 {{ ansible_facts.env.HOME }}/Documents/GitHub/dev_setup/vscode/merge_settings.py
  tags:
    - vscode

- name: Symlink VSCode keybindings
  file:
    src: "{{ ansible_facts.env.HOME }}/Documents/GitHub/dev_setup/vscode/Library/Application Support/Code/User/keybindings.json"
    dest: "{{ ansible_facts.env.HOME }}/Library/Application Support/Code/User/keybindings.json"
    state: link
    force: yes
  tags:
    - vscode

- name: Create VSCode extensions directory
  file:
    path: "{{ ansible_facts.env.HOME }}/.vscode/extensions"
    state: directory
    mode: "0755"
  tags:
    - vscode

- name: Symlink local VSCode copy-reference extension
  file:
    src: "{{ ansible_facts.env.HOME }}/Documents/GitHub/dev_setup/vscode/extensions/copy-reference"
    dest: "{{ ansible_facts.env.HOME }}/.vscode/extensions/dev-setup.copy-reference-0.1.0"
    state: link
    force: yes
  tags:
    - vscode

- name: Add VSCode to PATH in ~/.zprofile
  lineinfile:
    path: "{{ ansible_facts.env.HOME }}/.zprofile"
    line: "{{ item }}"
    create: yes
  loop:
    - "# Add Visual Studio Code (code)"
    - 'export PATH="$PATH:/Applications/Visual Studio Code.app/Contents/Resources/app/bin"'
  tags:
    - vscode

- name: Install VSCode extensions
  command: >
    python3 {{ ansible_facts.env.HOME }}/Documents/GitHub/dev_setup/vscode/manage_extensions.py --install
  environment:
    PATH: "{{ ansible_facts.env.PATH }}:/Applications/Visual Studio Code.app/Contents/Resources/app/bin"
  tags:
    - vscode

- name: Disable press-and-hold in VSCode (allows holding down keys for Vim hjkl)
  shell: defaults write com.microsoft.VSCode ApplePressAndHoldEnabled -bool false
  tags:
    - vscode
